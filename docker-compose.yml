version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rankpanda_postgres
    environment:
      POSTGRES_USER: rankpanda
      POSTGRES_PASSWORD: rankpanda
      POSTGRES_DB: rankpanda_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rankpanda"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rankpanda_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rankpanda_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: "development"
      DATABASE_URL: "postgresql://rankpanda:rankpanda@postgres:5432/rankpanda_dev"
      SESSION_SECRET: "dev-secret-key-change-in-production"
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - rankpanda_network
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:

networks:
  rankpanda_network:
    driver: bridge
